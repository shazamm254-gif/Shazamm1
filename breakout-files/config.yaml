# Breakout Files — pipeline config
# Every knob lives here. Nothing is hardcoded in run.py.
# Secrets are read from environment variables — put them in .env and
# `source .env` before running (see .env.example).

anthropic:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-5"
  max_tokens: 2000
  # Deadpan documentary voice, "Case File" structure. {case_name} is substituted.
  system_prompt: |
    You are the writer for "Breakout Files," a deadpan-documentary true-crime
    YouTube Shorts series about death row / prisoner case files. You only use
    public-record facts (court records, DOC press releases, contemporaneous
    news coverage). No gore, no glorification, no invented dialogue or details.
    If a specific fact (e.g. last words) is not reliably public record, omit it
    rather than invent it.

    Write a single Short script for the case the user names. Structure, in
    this order:
      1. Hook (first 2 seconds) — a single startling, true fact or question.
      2. Crime — what happened, stated plainly.
      3. Sentence — trial outcome and sentence.
      4. Final days — time on death row / lead-up.
      5. Last words / last meal — factual record if publicly documented.
      6. Outro — end on a flat, deadpan "File remains open." style line that
         teases the next case in the series (do not name a specific next case).

    Tone: flat, matter-of-fact narration. Short declarative sentences. Build a
    curiosity gap early (withhold one detail — e.g. the sentence, or the fact
    behind the hook — and resolve it later). Total narration must read aloud
    in 45-55 seconds (roughly 110-150 words).

    Break the script into 6-8 scenes. Each scene is one beat of narration
    (1-3 sentences) plus a still-image prompt describing what should be on
    screen. Image prompts must be purely visual/descriptive (place, era,
    objects, mood) — never depict a named real person's face or likeness,
    never include on-image text, never depict graphic violence.

    Respond with ONLY valid JSON, no markdown fences, matching exactly:
    {
      "title": "short punchy YouTube title, under 90 chars",
      "description": "1-2 sentence YouTube description",
      "hashtags": ["#tag1", "#tag2", "#tag3"],
      "scenes": [
        {"narration": "...", "image_prompt": "..."}
      ]
    }

elevenlabs:
  api_key: "${ELEVENLABS_API_KEY}"
  voice_id: "nPczCjzI2devNBz1zQrb"   # Brian
  model_id: "eleven_multilingual_v2"
  voice_settings:
    stability: 0.55
    similarity_boost: 0.75
    style: 0.15
    use_speaker_boost: true

huggingface:
  token: "${HF_TOKEN}"
  space: "black-forest-labs/FLUX.1-schnell"   # ZeroGPU Space, api_name /infer
  account: "Gurulegrnd"
  api_name: "/infer"
  num_inference_steps: 4
  retry_attempts: 3
  retry_backoff_sec: 5

image:
  count_min: 6
  count_max: 8
  width: 768
  height: 1344
  style_prompt: >
    photorealistic documentary photograph, noir lighting, deep navy shadows,
    warm gold rim light, subtle film grain, 35mm still, moody and restrained,
    no text, no watermark, no logos
  negative_prompt: "text, watermark, logo, cartoon, illustration, gore, blood, disfigurement"
  fallback_stock_dir: "assets/stock"

video:
  width: 1080
  height: 1920
  fps: 30
  crossfade_sec: 0.3
  kenburns_zoom_per_sec: 0.045   # total zoom added over a 1s clip
  kenburns_max_zoom: 1.15
  music_file: "assets/music.mp3"
  music_duck_db: -18

metadata:
  filename: "metadata.txt"

output:
  dir: "output"
  tmp_dir: "output/.tmp"

dry_run:
  sample_script: "sample/dry_run_sample.json"
  placeholder_dir: "assets/placeholders"
